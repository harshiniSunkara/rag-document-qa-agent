<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Document Q&A</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f1117;
    --surface:   #1a1d27;
    --border:    #2a2d3a;
    --accent:    #6c63ff;
    --accent2:   #a78bfa;
    --text:      #e2e8f0;
    --muted:     #8892a4;
    --success:   #34d399;
    --error:     #f87171;
    --high:      #34d399;
    --medium:    #fbbf24;
    --low:       #f87171;
    --radius:    12px;
    --font:      'Inter', system-ui, -apple-system, sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    padding: 24px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  header p  { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .badge {
    margin-left: auto;
    font-size: 11px; font-weight: 600;
    padding: 4px 10px;
    background: rgba(108,99,255,0.15);
    color: var(--accent2);
    border: 1px solid rgba(108,99,255,0.3);
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  /* ── Layout ── */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 0;
    height: calc(100vh - 73px);
  }

  /* ── Left panel ── */
  .left-panel {
    border-right: 1px solid var(--border);
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    overflow-y: auto;
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: rgba(108,99,255,0.05);
  }
  .upload-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .upload-icon { font-size: 28px; margin-bottom: 10px; }
  .upload-zone p { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .upload-zone strong { color: var(--text); }
  .file-types { font-size: 11px; color: var(--muted); margin-top: 6px; }

  /* Status */
  .status-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    font-size: 13px;
    display: none;
  }
  .status-box.show { display: block; }
  .status-box.success { border-color: rgba(52,211,153,0.4); }
  .status-box.error   { border-color: rgba(248,113,113,0.4); }
  .status-title {
    font-weight: 600; margin-bottom: 4px;
    display: flex; align-items: center; gap: 6px;
  }
  .status-title.success { color: var(--success); }
  .status-title.error   { color: var(--error); }
  .status-detail { color: var(--muted); font-size: 12px; }

  /* Mode selector */
  .mode-cards {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .mode-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .mode-card:hover { border-color: var(--accent); }
  .mode-card.active {
    border-color: var(--accent);
    background: rgba(108,99,255,0.08);
  }
  .mode-icon {
    font-size: 16px;
    margin-top: 1px;
    flex-shrink: 0;
  }
  .mode-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .mode-desc { font-size: 11px; color: var(--muted); line-height: 1.4; }
  .mode-card input[type="radio"] { display: none; }

  /* Stats */
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }
  .stat-value { font-size: 20px; font-weight: 700; color: var(--accent2); }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* ── Right panel ── */
  .right-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    color: var(--muted);
    text-align: center;
  }
  .empty-icon { font-size: 48px; opacity: 0.4; }
  .empty-state h2 { font-size: 16px; font-weight: 600; color: var(--text); opacity: 0.6; }
  .empty-state p  { font-size: 13px; max-width: 320px; line-height: 1.6; }

  /* Messages */
  .message { display: flex; flex-direction: column; gap: 6px; max-width: 800px; }
  .message.user { align-self: flex-end; align-items: flex-end; }
  .message.assistant { align-self: flex-start; }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.6;
    max-width: 680px;
  }
  .user .msg-bubble {
    background: linear-gradient(135deg, var(--accent), #8b83ff);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .assistant .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .msg-meta {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: var(--muted);
  }
  .mode-tag {
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.3px;
    background: rgba(108,99,255,0.15);
    color: var(--accent2);
  }
  .confidence-tag {
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
  }
  .confidence-tag.high   { background: rgba(52,211,153,0.15);  color: var(--high); }
  .confidence-tag.medium { background: rgba(251,191,36,0.15);  color: var(--medium); }
  .confidence-tag.low    { background: rgba(248,113,113,0.15); color: var(--low); }

  .sources-list {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
  }
  .sources-list strong { color: var(--text); }

  /* Thinking animation */
  .thinking {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    border-bottom-left-radius: 4px;
    font-size: 13px;
    color: var(--muted);
  }
  .dots { display: flex; gap: 4px; }
  .dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  /* Input bar */
  .input-bar {
    padding: 20px 32px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .input-wrapper {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    display: flex;
    align-items: flex-end;
    padding: 4px 4px 4px 16px;
    transition: border-color 0.15s;
  }
  .input-wrapper:focus-within { border-color: var(--accent); }
  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.5;
    resize: none;
    min-height: 24px;
    max-height: 120px;
    padding: 8px 0;
  }
  textarea::placeholder { color: var(--muted); }

  .send-btn {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), #8b83ff);
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.15s, transform 0.1s;
    flex-shrink: 0;
    margin: 2px;
  }
  .send-btn:hover { opacity: 0.9; }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Spinner for upload */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(108,99,255,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">🔍</div>
  <div>
    <h1>RAG Document Q&A</h1>
    <p>Ask questions about your documents using local LLMs</p>
  </div>
  <span class="badge">Mistral 7B · Ollama</span>
</header>

<main>
  <!-- LEFT PANEL -->
  <div class="left-panel">

    <!-- Upload -->
    <div>
      <div class="section-label">Document</div>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept=".pdf,.txt,.md">
        <div class="upload-icon">📄</div>
        <p><strong>Drop a file here</strong><br>or click to browse</p>
        <p class="file-types">PDF · TXT · MD</p>
      </div>
      <div class="status-box" id="statusBox">
        <div class="status-title" id="statusTitle"></div>
        <div class="status-detail" id="statusDetail"></div>
      </div>
    </div>

    <!-- Stats -->
    <div>
      <div class="section-label">Session</div>
      <div class="stats">
        <div class="stat">
          <div class="stat-value" id="chunkCount">—</div>
          <div class="stat-label">Chunks</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="queryCount">0</div>
          <div class="stat-label">Queries</div>
        </div>
      </div>
    </div>

    <!-- Mode -->
    <div>
      <div class="section-label">Query Mode</div>
      <div class="mode-cards">
        <label class="mode-card active" id="mode-few_shot">
          <input type="radio" name="mode" value="few_shot" checked>
          <div class="mode-icon">✨</div>
          <div>
            <div class="mode-name">Few-Shot RAG</div>
            <div class="mode-desc">Guided by examples. Structured JSON output with confidence score.</div>
          </div>
        </label>
        <label class="mode-card" id="mode-cot">
          <input type="radio" name="mode" value="cot">
          <div class="mode-icon">🧠</div>
          <div>
            <div class="mode-name">Chain-of-Thought</div>
            <div class="mode-desc">Reasons step by step before answering. More thorough.</div>
          </div>
        </label>
        <label class="mode-card" id="mode-agent">
          <input type="radio" name="mode" value="agent">
          <div class="mode-icon">🤖</div>
          <div>
            <div class="mode-name">ReAct Agent</div>
            <div class="mode-desc">Uses doc retrieval + web search. Picks the right tool automatically.</div>
          </div>
        </label>
      </div>
    </div>

  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="chat-area" id="chatArea">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">💬</div>
        <h2>No document loaded yet</h2>
        <p>Upload a PDF, TXT, or MD file on the left, then ask anything about it.</p>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-wrapper">
        <textarea id="questionInput"
                  placeholder="Ask a question about your document…"
                  rows="1"></textarea>
      </div>
      <button class="send-btn" id="sendBtn" disabled title="Send">➤</button>
    </div>
  </div>
</main>

<script>
  const fileInput    = document.getElementById('fileInput');
  const uploadZone   = document.getElementById('uploadZone');
  const statusBox    = document.getElementById('statusBox');
  const statusTitle  = document.getElementById('statusTitle');
  const statusDetail = document.getElementById('statusDetail');
  const chatArea     = document.getElementById('chatArea');
  const emptyState   = document.getElementById('emptyState');
  const questionInput= document.getElementById('questionInput');
  const sendBtn      = document.getElementById('sendBtn');
  const chunkCount   = document.getElementById('chunkCount');
  const queryCount   = document.getElementById('queryCount');

  let docLoaded  = false;
  let queryTotal = 0;

  // ── Mode selection ──────────────────────────────────────────────────────────
  document.querySelectorAll('input[name="mode"]').forEach(radio => {
    radio.addEventListener('change', () => {
      document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('active'));
      radio.closest('.mode-card').classList.add('active');
    });
  });

  function getMode() {
    return document.querySelector('input[name="mode"]:checked').value;
  }

  // ── Drag & drop ─────────────────────────────────────────────────────────────
  uploadZone.addEventListener('dragover',  e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', ()=> uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) uploadFile(file);
  });
  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) uploadFile(fileInput.files[0]);
  });

  // ── Upload ──────────────────────────────────────────────────────────────────
  function showStatus(type, title, detail) {
    statusBox.className = `status-box show ${type}`;
    statusTitle.className = `status-title ${type}`;
    statusTitle.innerHTML = (type === 'success' ? '✓ ' : '✗ ') + title;
    statusDetail.textContent = detail;
  }

  async function uploadFile(file) {
    const allowed = ['pdf','txt','md'];
    const ext = file.name.split('.').pop().toLowerCase();
    if (!allowed.includes(ext)) {
      showStatus('error', 'Invalid file type', 'Please upload a PDF, TXT, or MD file.');
      return;
    }

    showStatus('', '<span class="spinner"></span> Processing…', `Chunking and embedding ${file.name}`);
    statusBox.className = 'status-box show';
    statusTitle.className = 'status-title';

    const formData = new FormData();
    formData.append('file', file);

    try {
      const res  = await fetch('/upload', { method: 'POST', body: formData });
      const data = await res.json();

      if (data.error) {
        showStatus('error', 'Upload failed', data.error);
      } else {
        showStatus('success', `${data.filename} ready`, `${data.chunks} chunks embedded`);
        chunkCount.textContent = data.chunks;
        docLoaded = true;
        sendBtn.disabled = false;
        // Update empty state
        emptyState.querySelector('h2').textContent = `${data.filename} loaded`;
        emptyState.querySelector('p').textContent  = 'Ask anything about this document below.';
        questionInput.focus();
      }
    } catch (err) {
      showStatus('error', 'Connection error', 'Make sure the Flask server is running.');
    }
  }

  // ── Chat ────────────────────────────────────────────────────────────────────
  function addMessage(role, content, meta = {}) {
    // Remove empty state on first message
    if (emptyState && emptyState.parentNode) emptyState.remove();

    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    if (role === 'user') {
      msg.innerHTML = `<div class="msg-bubble">${escHtml(content)}</div>`;
    } else if (role === 'thinking') {
      msg.id = 'thinking';
      msg.className = 'message assistant';
      msg.innerHTML = `
        <div class="thinking">
          <div class="dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
          </div>
          <span>Thinking…</span>
        </div>`;
    } else {
      const confidenceClass = (meta.confidence || 'medium').toLowerCase();
      const sourcesHtml = meta.sources && meta.sources.length
        ? `<div class="sources-list"><strong>Sources:</strong> ${meta.sources.join(', ')}</div>`
        : '';
      msg.innerHTML = `
        <div class="msg-bubble">
          ${escHtml(content)}
          ${sourcesHtml}
        </div>
        <div class="msg-meta">
          <span class="mode-tag">${escHtml(meta.mode || 'RAG')}</span>
          <span class="confidence-tag ${confidenceClass}">${confidenceClass} confidence</span>
        </div>`;
    }

    chatArea.appendChild(msg);
    chatArea.scrollTop = chatArea.scrollHeight;
    return msg;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function sendQuestion() {
    const question = questionInput.value.trim();
    if (!question || !docLoaded) return;

    addMessage('user', question);
    questionInput.value = '';
    questionInput.style.height = 'auto';
    sendBtn.disabled = true;

    const thinking = addMessage('thinking');

    try {
      const res  = await fetch('/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, mode: getMode() })
      });
      const data = await res.json();
      thinking.remove();

      if (data.error) {
        addMessage('assistant', `Error: ${data.error}`, { mode: 'Error', confidence: 'low' });
      } else {
        addMessage('assistant', data.answer, {
          mode:       data.mode,
          confidence: data.confidence,
          sources:    data.sources
        });
        queryTotal++;
        queryCount.textContent = queryTotal;
      }
    } catch (err) {
      thinking.remove();
      addMessage('assistant', 'Connection error. Make sure Ollama is running.', { mode: 'Error', confidence: 'low' });
    }

    sendBtn.disabled = !docLoaded;
    questionInput.focus();
  }

  // Send on button click
  sendBtn.addEventListener('click', sendQuestion);

  // Send on Enter (Shift+Enter for newline)
  questionInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendQuestion();
    }
  });

  // Auto-resize textarea
  questionInput.addEventListener('input', () => {
    questionInput.style.height = 'auto';
    questionInput.style.height = Math.min(questionInput.scrollHeight, 120) + 'px';
  });
</script>
</body>
</html>
